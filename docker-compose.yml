services:
  db:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-plautigrz" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    image: ghcr.io/lautigrz/todo-list:latest
    container_name: app
    ports:
      - "80:3000"
    environment:
      DATABASE_URL: mysql://root:${DB_PASSWORD}@db:3306/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm start"

volumes:
  mysql_data:
